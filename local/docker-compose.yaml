# Local pipeline Kafka (single-node KRaft). Independent from the Airflow stack,
# which runs its own broker under airflow/docker-compose.yaml.
# Pinned project name keeps the container/volume/network stable no matter which
# directory you run `docker compose` from.
name: vehicle-reid-local
services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-server
    ports:
      - "9092:9092"
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      # KRaft uses voters, not bootstrap_servers
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-server:9093"

      # listeners
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # required for KRaft
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      # single node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # optional
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 10485760

      # Retention is sized for this pipeline, not for durability. Keep messages just
      # long enough to cover the cross-camera travel window (cam3 matches ~20-40s after
      # cam1) plus consumer lag headroom: 2 minutes.
      KAFKA_LOG_RETENTION_MS: 120000
      # Secondary cap, per partition (~2 min of the busy frame topic at ~3-4 MB/s).
      KAFKA_LOG_RETENTION_BYTES: 536870912
      # Small segments so old data can actually roll off and be deleted within a run;
      # a 256 MB segment would barely roll before retention should have purged it.
      KAFKA_LOG_SEGMENT_BYTES: 67108864
      # Check for expired segments every 30s so cleanup is timely between test runs.
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 30000

    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  kafka_data:
